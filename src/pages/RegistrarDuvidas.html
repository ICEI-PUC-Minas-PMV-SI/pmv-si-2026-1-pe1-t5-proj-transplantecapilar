<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Dúvida</title>
    <link rel="stylesheet" href="../css/UpLoadFotos.css">
    <link rel="stylesheet" href="../css/RegistrarDuvidas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand-logo-circle">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                </svg>
            </div>
            <div class="brand-name">HairCare Pro</div>
            <div class="brand-subtitle">PÓS-OPERATÓRIO CAPILAR</div>
        </div>

        <nav class="nav-menu">
            <a href="../pages/PainelPaciente.html" class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Início
            </a>
            <a href="../pages/orientacaoes.html" class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                Orientações
            </a>
            <a href="#" class="nav-item active">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                Registrar Dúvidas
            </a>

            <div class="nav-footer">
                <div class="nav-divider"></div>
                <a href="../pages/login.html" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Sair
                </a>
            </div>
        </nav>
    </aside>

    <main class="main-wrapper">
        <header class="topbar">
            <button class="hamburger" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Abrir menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>

            <div class="page-title">Registrar Dúvida</div>

            <div class="topbar-actions">
                <div class="notification-wrapper">
                    <button class="notification-btn" id="notification-btn" aria-label="Notificações" type="button">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        <span class="notification-dot">1</span>
                    </button>
                    <div class="notification-menu" id="notification-menu">
                        <div class="notification-menu-header">Notificações</div>
                        <button class="notification-item" type="button">
                            <div class="notification-icon yellow"></div>
                            <div class="notification-text">
                                <strong>Avaliação pendente</strong>
                                <span>Você ainda não respondeu o questionário de hoje.</span>
                            </div>
                        </button>
                    </div>
                </div>
                <div class="user-profile">
                    <div class="avatar">FH</div>
                    <span class="user-name">Fulano_HML</span>
                </div>
            </div>
        </header>

        <div class="conteudo-duvida">
            <div class="cartao-duvida">
                <div class="cartao-cabecalho">
                    <h1 class="cartao-titulo">Registrar Dúvida ou Comentário</h1>
                    <p class="cartao-subtitulo">Envie dúvidas ou comentários para sua equipe médica.<br>Estamos aqui para ajudar!</p>
                </div>
                <div class="cartao-secao">
                    <div class="secao-label">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        Qual é a sua dúvida ou comentário?
                    </div>
                    <textarea class="duvida-textarea" placeholder="Digite aqui seu comentário (opcional)"></textarea>
                </div>
                <div class="cartao-secao">
                    <label class="zona-upload-duvida" for="input-imagens">
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#283d74" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                        <span class="upload-texto-principal">Enviar imagens (opcional)</span>
                        <span class="upload-texto-dica">Arraste e solte aqui suas fotos ou clique para selecionar</span>
                        <input type="file" id="input-imagens" multiple accept="image/*" class="input-arquivo">
                    </label>
                </div>
                <div class="cartao-secao-botao">
                    <button class="botao-enviar-duvida">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        Enviar Dúvida
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="RegistrarDuvidas.js"></script>
</body>
</html>
