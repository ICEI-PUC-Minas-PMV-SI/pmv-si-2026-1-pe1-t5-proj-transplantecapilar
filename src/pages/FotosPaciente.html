<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos do Paciente</title>
    <link rel="stylesheet" href="../css/lista-de-pacientes.css">
    <link rel="stylesheet" href="../css/FotosPaciente.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script src="../js/FotosPaciente.js" defer></script>
</head>

<body>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="layout">

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand-logo-circle">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                    </svg>
                </div>
                <div class="brand-name">HairCare Pro</div>
                <div class="brand-subtitle">PÓS-OPERATÓRIO CAPILAR</div>
            </div>

            <nav class="nav-menu">
                <a href="PainelMedico.html" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Início
                </a>
                <a href="lista-de-pacientes.html" class="nav-item active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Meus Pacientes
                </a>
                <a href="orientacoes.html" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    Alertas
                    <span class="badge-nav">1</span>
                </a>
                <a href="RegistrarDuvidas.html" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    Dúvidas
                </a>

                <div class="nav-footer">
                    <div class="nav-divider"></div>
                    <a href="login.html" class="nav-item">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                        Sair
                    </a>
                </div>
            </nav>
        </aside>

        <main class="conteudo">

            <header class="topo">

                <button class="btn-menu-mobile" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Abrir menu">
                    <i class="fa-solid fa-bars"></i>
                </button>

                <div class="caminho">
                    <a href="PainelMedico.html">Início</a>
                    <span>></span>
                    <a href="lista-de-pacientes.html">Lista de Pacientes</a>
                    <span>></span>
                    <a href="detalhes-pacientes.html">Detalhes do Paciente</a>
                    <span>></span>
                    <span>Fotos do Paciente</span>
                </div>

                <div class="perfil-area">
                    <div class="notificacao" id="notificationWrapper">
                        <button class="notification-btn" id="notificationBtn" type="button">
                            <i class="fa-regular fa-bell sino"></i>
                            <span class="bolinha" id="notificationDot">4</span>
                        </button>

                        <div class="notification-menu" id="notificationMenu">
                            <div class="notification-menu-header">Notificações</div>

                            <button class="notification-item" type="button">
                                <div class="notification-icon red"></div>
                                <div class="notification-text">
                                    <strong>Alerta crítico</strong>
                                    <span>Rafael Souza relatou dor nível 8.</span>
                                </div>
                            </button>

                            <button class="notification-item" type="button">
                                <div class="notification-icon yellow"></div>
                                <div class="notification-text">
                                    <strong>Fotos atrasadas</strong>
                                    <span>Lucas Fernandes está há 2 dias sem envio.</span>
                                </div>
                            </button>

                            <button class="notification-item" type="button">
                                <div class="notification-icon blue"></div>
                                <div class="notification-text">
                                    <strong>Dúvida pendente</strong>
                                    <span>André Lima enviou uma dúvida.</span>
                                </div>
                            </button>

                            <button class="notification-item" type="button">
                                <div class="notification-icon blue"></div>
                                <div class="notification-text">
                                    <strong>Nova dúvida</strong>
                                    <span>Gabriel Victor perguntou sobre vermelhidão.</span>
                                </div>
                            </button>
                        </div>
                    </div>

                    <div class="perfil">
                        <div class="perfil-circulo" id="perfilCirculo">JD</div>
                        <span id="nomeUsuarioTopo">Joao da Silva</span>
                    </div>
                </div>

            </header>

            <section class="area-principal">

                <div class="cabecalho-paciente">
                    <div class="paciente-info">
                        <div class="paciente-circulo">JC</div>
                        <div>
                            <h1>Fotos Enviadas de João Carlos</h1>
                            <p>Visualize as fotos enviadas pelo paciente durante o pós-operatório.</p>
                        </div>
                    </div>
                </div>

                <div class="cards-fotos" id="cardsFotos"></div>

                <button class="botao-voltar" id="btnVoltar">
                    <i class="fa-solid fa-arrow-left"></i>
                    Voltar para Detalhes
                </button>

            </section>

        </main>

    </div>

    <div class="modal-foto" id="modalFoto">
        <div class="modal-conteudo">
            <button class="fechar-modal" id="fecharModal">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div class="modal-imagem-area" id="modalImagemArea"></div>
        </div>
    </div>

</body>
</html>
