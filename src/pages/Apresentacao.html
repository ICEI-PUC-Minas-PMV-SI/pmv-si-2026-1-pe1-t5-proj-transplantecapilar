<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HairCare Pro — Apresentação</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #111b3a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .slide {
            position: relative;
            width: min(960px, 100vw);
            aspect-ratio: 16 / 9;
            box-shadow: 0 24px 70px rgba(0,0,0,0.7);
            overflow: hidden;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .btn-entrar {
            position: absolute;
            bottom: 5%;
            right: 4%;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: #e8c04a;
            color: #1a2560;
            text-decoration: none;
            font-family: Arial, Helvetica, sans-serif;
            font-size: clamp(10px, 1.2vw, 13px);
            font-weight: 700;
            padding: clamp(7px, 0.9vw, 11px) clamp(14px, 1.8vw, 22px);
            border-radius: 2px;
            white-space: nowrap;          
            transition: background 0.2s, transform 0.15s;
        }

        .btn-entrar:hover {
            background: #f5d060;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="slide">
    <img src="Captura de tela 2026-06-19 151448.png" alt="Capa de apresentação HairCare Pro">
    <a href="../index.html" class="btn-entrar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Acessar o Sistema
    </a>
</div>

</body>
</html>
