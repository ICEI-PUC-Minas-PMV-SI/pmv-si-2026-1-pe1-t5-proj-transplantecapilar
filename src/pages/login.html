<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - HairCare Pro</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <main class="auth-container">
    <section class="auth-left">
      <div class="brand">
        <div class="logo-circle"></div>
        <h1>HairCare Pro</h1>
      </div>

      <h2>Acompanhamento pós-operatório</h2>
      <p>Plataforma dedicada ao monitoramento de pacientes e suporte à equipe de saúde.</p>

      <ul>
        <li>Monitoramento contínuo</li>
        <li>Alertas automáticos</li>
        <li>Acesso seguro por perfil</li>
      </ul>
    </section>

    <section class="auth-right">
      <h2>Bem-vindo(a)</h2>

      <p class="divider">Entrar como</p>

      <div class="profile-buttons">
        <button type="button" class="profile active" data-profile="paciente">Paciente</button>
        <button type="button" class="profile" data-profile="profissional">Profissional</button>
      </div>

      <form id="loginForm">
        <label for="login">E-mail / CPF / CRM</label>
        <input type="text" id="login" placeholder="ex: dr.joao@clinica.com.br" required>

        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha" required>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="manterConectado">
            Manter conectado
          </label>
          <a href="#">Esqueci a senha</a>
        </div>

        <button type="submit" class="primary-button">Entrar no Sistema</button>

        <a href="cadastro.html" class="create-account">Criar conta</a>

        <p id="loginMessage" class="message"></p>
      </form>

      <footer>
        <a href="#">Suporte</a>
        <span>•</span>
        <a href="#">Contato</a>
        <span>•</span>
        <a href="#">Sobre</a>
      </footer>
    </section>
  </main>

  <script src="../js/login.js"></script>
</body>
</html>
